[tool.poetry]
name = "supergene"
version = "0.1.0"
description = "A module to facilitate the scraping, procedural editing and formatting of the webnovel, Super [God] Gene. It also can automate converting the chapters into ebooks using Pandoc."
authors = ["maxludden <dev@maxludden.com>"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.10"
maxconsole = "^0.4.0"
maxprogress = "^0.4.0"
maxcolor = "^1.0.0"
maxsetup = "^0.7.0"


[tool.poetry.group.dev.dependencies]
black = "^22.10.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
