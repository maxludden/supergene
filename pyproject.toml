[tool.pdm]

[project]
name = "supergene"
version = "0.2.0"
description = "Module to automate the scraping, formatting, editing, of the webnovel, \"Super Gene\", programattically. It also has helper functions generate the scraped webnovel into epub 3.0 eBooks."
authors = [
    {name = "maxludden", email = "dev@maxludden.com"},
]
dependencies = []
requires-python = ">=3.11"
readme = "README.md"
license = {text = "MIT"}

[build-system]
requires = ["pdm-pep517>=1.0"]
build-backend = "pdm.pep517.api"
